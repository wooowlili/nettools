name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.*"

      - name: Build
        run: make compile

      - name: Test
        run: go test -race -timeout=120s -cover $(go list ./... | grep -vE "vendor|/cmd")

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: test -z "$(gofmt -l .)"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.*"

      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
