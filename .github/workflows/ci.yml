name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go_badges:
    runs-on: ubuntu-latest
    name: A job to generate badges
    permissions:
      contents: write
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.*"

      - name: Go Report Card
        id: goreportcard
        uses: jacobkring/actions-goreportcard@v0.0.5

      - name: Generate coverage
        id: coverage
        run: |
          go test -coverprofile=coverage.out $(go list ./... | grep -vE "vendor|/cmd")
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print substr($3, 1, length($3)-1)}')
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - id: badges
        uses: jacobkring/go-badges@v1.10.34
        with:
          report-card: ${{ steps.goreportcard.outputs.summary }}
          coverage: ${{ steps.coverage.outputs.coverage }}
          IS_GO_BADGES: "true"

      - name: Commit README.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "$(git --no-pager log --format=format:'%an' -n 1)"
          git config --global user.email "$(git --no-pager log --format=format:'%ae' -n 1)"
          git add README.md
          git commit -m "go-badges update" || echo "No changes to commit"
          git push
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.*"

      - name: Build
        run: make compile

      - name: Test
        run: go test -race -timeout=120s -cover $(go list ./... | grep -vE "vendor|/cmd")

      - name: Vet
        run: go vet ./...

      - name: Format check
        run: test -z "$(gofmt -l .)"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.*"

      - uses: golangci/golangci-lint-action@v7
        with:
          version: latest
